version: 2
shipctl_min: "0.12.0"
preset: api-backend
repo: Arthur488/bookstore

api:
  base_url: "https://ship-public.x-auto.in.ua"
  channel: stable
  ttl_hours: 24
  offline_ok: true

stack:
  tracker: linear
  ci: gh-actions
  agents:
    - claude-md
  language: java
  preset: api-backend

process:
  id: decomposition
  name: Bookstore Documentation Decomposition
  primary: false
  gates: after_pr

  states:
    - id: lead_scope
      name: Lead scope analysis
      specialist:
        id: planning
        name: Planning
      instructions: >
        Act as a technical lead using the standard Ship planning role.
        Analyze the Bookstore repository, define documentation scope,
        identify main modules, architecture boundaries, risks, and what
        the next agents must inspect.

    - id: ba_requirements
      name: Business analysis
      specialist:
        id: planning
        name: Planning
      instructions: >
        Act as a business analyst using the standard Ship planning role.
        Convert the lead scope into business-facing documentation requirements:
        domain entities, user scenarios, API use cases, expected readers,
        and missing documentation sections.

    - id: dev_technical_analysis
      name: Developer technical analysis
      specialist:
        id: developer
        name: Developer
      instructions: >
        Act as a Java Spring Boot developer.
        Inspect the Maven project, Java 17 setup, Spring Boot configuration,
        controllers, services, repositories, entities, Liquibase migrations,
        PostgreSQL usage, OpenAPI/Swagger setup, tests, and runtime assumptions.
        Produce verified technical notes for the writer stage.

    - id: technical_writing
      name: Technical writing
      specialist:
        id: planning
        name: Planning
      instructions: >
        Act as a technical writer using the standard Ship planning role.
        Use outputs from lead, BA, and developer stages to prepare polished
        public repository documentation. Prefer README.md and docs/*.md.
        Cover overview, features, architecture, stack, setup, configuration,
        database migrations, API documentation, testing, troubleshooting,
        and known limitations.

    - id: documentation_review
      name: Documentation review
      specialist:
        id: reviewer
        name: Reviewer
      instructions: >
        Act as a final technical reviewer.
        Review produced documentation for correctness, completeness,
        consistency with the Bookstore codebase, and usefulness for developers.
        If acceptable, finalize the task; otherwise leave concrete corrections.

    - id: planning_done
      name: Decomposition done
      specialist:
        id: reviewer
        name: Reviewer
      instructions: >
        Terminal state. No further agent work should be executed here.

  transitions:
    - from: lead_scope
      to: ba_requirements
    - from: ba_requirements
      to: dev_technical_analysis
    - from: dev_technical_analysis
      to: technical_writing
    - from: technical_writing
      to: documentation_review
    - from: documentation_review
      to: planning_done

  routines:
    lead_scope:
      name: Lead scope analysis
      enabled: true
      specialist: planning
      fsm_stage: lead_scope
      pipeline_priority: 50
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are the first agent in the Bookstore documentation decomposition chain.
        Act as a technical lead. Read the repository and existing README.
        Produce a scope note: project purpose, main modules, architecture boundaries,
        documentation risks, and exact handoff instructions for the BA stage.

    ba_requirements:
      name: Business analysis
      enabled: true
      specialist: planning
      fsm_stage: ba_requirements
      pipeline_priority: 40
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are the BA stage in the Bookstore documentation decomposition chain.
        Use the lead scope output. Describe business capabilities: books, authors,
        categories, orders, reports, API consumers, domain terminology,
        and documentation requirements. Hand off clear requirements to the developer stage.

    dev_technical_analysis:
      name: Developer technical analysis
      enabled: true
      specialist: developer
      fsm_stage: dev_technical_analysis
      pipeline_priority: 30
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are the developer analysis stage. Use previous outputs and inspect the code.
        Document real implementation details: Spring Boot, Java 17, Maven, JPA/Hibernate,
        PostgreSQL, Liquibase, OpenAPI/Swagger, package structure, tests, application
        startup, config files, and inconsistencies between README and code.
        Hand off verified technical notes to the writing stage.

    technical_writing:
      name: Technical writing
      enabled: true
      specialist: planning
      fsm_stage: technical_writing
      pipeline_priority: 20
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are the technical writing stage. Use all previous outputs.
        Produce clean public GitHub documentation for Bookstore.
        Prefer README.md and docs/*.md changes. Structure documentation with:
        overview, features, architecture, technology stack, local setup,
        environment configuration, database and Liquibase migrations,
        API documentation, testing, troubleshooting, and known limitations.

    documentation_review:
      name: Documentation review
      enabled: true
      specialist: reviewer
      fsm_stage: documentation_review
      pipeline_priority: 10
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are the final review stage. Review the documentation output.
        Check technical accuracy against the repository, consistency, missing setup steps,
        API/database correctness, and developer usefulness. Approve only if the docs are
        ready for a public repository; otherwise provide exact fixes.

lanes: {}

artifacts:
  pins: {}
  auto_update: true

cache:
  vcs_tracked: false

telemetry:
  share: false
  anonymous_id: null
  scope:
    artifact_usage: true
    improvement_drafts: true
    errors: false