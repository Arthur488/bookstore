version: 2
shipctl_min: "0.12.0"
preset: api-backend
repo: Arthur488/bookstore

api:
  base_url: "https://ship-public.x-auto.in.ua"
  channel: stable
  ttl_hours: 24
  offline_ok: true

stack:
  tracker: linear
  ci: gh-actions
  agents:
    - claude-md
  language: java
  preset: api-backend

process:
  id: bookstore_docs_pipeline
  name: Bookstore Documentation Pipeline
  primary: true
  gates: after_pr

  states:
    - id: decomposition
      name: Decomposition
      specialist:
        id: decomposition
        name: Decomposition
      instructions: >
        Split a large Bookstore documentation goal into child Linear issues.
        Each child issue must be independently executable and should enter the
        standard Ship execution pipeline at stage:planning.

    - id: planning_done
      name: Decomposition done
      specialist:
        id: decomposition
        name: Decomposition
      instructions: >
        Terminal state for the parent decomposition task.

    - id: planning
      name: Documentation planning
      specialist:
        id: planning
        name: Planning
      instructions: >
        Analyze one selected Bookstore documentation child issue.
        Clarify the exact documentation scope, acceptance criteria, source files
        that must be inspected, and handoff notes for implementation.

    - id: dev_implementation
      name: Documentation implementation
      specialist:
        id: developer
        name: Developer
      instructions: >
        Implement the selected documentation task in the repository.
        Make real changes to README.md and/or docs/*.md, keep the content accurate
        to the Java Spring Boot codebase, and prepare a GitHub PR.

    - id: validation
      name: Documentation validation
      specialist:
        id: validation
        name: Validation
      instructions: >
        Validate the documentation changes against the repository.
        Check setup instructions, API paths, database/Liquibase details, Maven/Java
        version, tests, and known limitations. Return concrete fixes if needed.

    - id: code_review
      name: Documentation review
      specialist:
        id: reviewer
        name: Reviewer
      instructions: >
        Review the documentation PR for correctness, completeness, consistency,
        and developer usefulness. Approve only when it is ready.

    - id: auto_merge
      name: Ready to merge
      specialist:
        id: reviewer
        name: Reviewer
      instructions: >
        Terminal stage for approved documentation work. No agent should perform
        additional implementation here unless explicitly configured.

  transitions:
    - from: decomposition
      to: planning_done

    - from: planning
      to: dev_implementation
    - from: dev_implementation
      to: validation
    - from: validation
      to: code_review
    - from: code_review
      to: auto_merge

  routines:
    decomposition:
      name: Decompose Bookstore documentation work
      enabled: true
      specialist: decomposition
      fsm_stage: decomposition
      pipeline_priority: 100
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        You are running the Bookstore documentation decomposition stage.
        Analyze the repository Arthur488/bookstore and split the parent goal into
        practical child Linear issues. The target documentation set must cover:
        domain and business capabilities, architecture and code structure,
        database/PostgreSQL/Liquibase, REST API and Swagger/OpenAPI, local setup,
        build and configuration, testing, known limitations, README overhaul,
        and final documentation review. Child issues should be created so they can
        be executed by the standard pipeline starting from stage:planning.

    planning:
      name: Plan one documentation child issue
      enabled: true
      specialist: planning
      fsm_stage: planning
      pipeline_priority: 80
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        Pick one Bookstore documentation issue at stage:planning.
        Act as a lead/BA planner. Read the issue, repository, existing README,
        Maven config, source tree, and relevant code. Produce a precise plan:
        what documentation must be changed, which files to inspect, expected output,
        acceptance criteria, risks, and handoff notes. Move the issue to
        dev_implementation when the plan is ready.

    dev_implementation:
      name: Implement one documentation child issue
      enabled: true
      specialist: developer
      fsm_stage: dev_implementation
      pipeline_priority: 60
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        Pick one Bookstore documentation issue at stage:dev_implementation.
        Implement the requested documentation changes directly in the repository.
        Prefer README.md and docs/*.md. Keep the docs accurate to the actual
        Spring Boot 3.1.0 / Java 17 / Maven / PostgreSQL / Liquibase codebase.
        Verify actual endpoints, context path, configuration, tests, and known
        mismatches before writing. Commit the changes on a branch and open a PR.
        If a PR already exists for the issue, update that PR.

    validation:
      name: Validate one documentation PR
      enabled: true
      specialist: validation
      fsm_stage: validation
      pipeline_priority: 40
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        Pick one Bookstore documentation issue at stage:validation.
        Validate the documentation PR against the repository. Check that setup,
        Maven commands, Java version, Spring Boot details, REST API paths,
        Swagger/OpenAPI path, PostgreSQL/Liquibase behavior, tests, and limitations
        are correct. If something is wrong, leave precise corrections and mark the
        issue as needing fixes. If valid, move it to code_review.

    code_review:
      name: Review one documentation PR
      enabled: true
      specialist: reviewer
      fsm_stage: code_review
      pipeline_priority: 20
      trigger:
        type: schedule
        cron: "*/30 * * * *"
        window: "30m"
        catchup: latest
      prompt: >
        Pick one Bookstore documentation issue at stage:code_review.
        Review the associated PR. Check structure, readability, accuracy, and whether
        the documentation is useful for a new developer. Approve when ready or request
        concrete changes. If approved, move the issue to auto_merge / done according
        to the workspace policy.

lanes: {}

artifacts:
  pins: {}
  auto_update: true

cache:
  vcs_tracked: false

telemetry:
  share: false
  anonymous_id: null
  scope:
    artifact_usage: true
    improvement_drafts: true
    errors: false