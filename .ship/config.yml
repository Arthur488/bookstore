version: 2
shipctl_min: "0.12.0"

api:
  base_url: "https://ship-public.x-auto.in.ua"
  channel: stable
  ttl_hours: 24
  offline_ok: true

stack:
  tracker: linear
  ci: gh-actions
  agents:
    - claude-md
  language: java
  preset: api-backend

process:
  id: development
  name: Bookstore Documentation Pipeline
  primary: true
  gates: after_pr

  states:
    - id: decomposition
      name: Decomposition
      specialist:
        id: decomposition
        name: Decomposition
      instructions: >
        Split the parent Bookstore documentation goal into executable child Linear issues.
        Child issues must start from stage:planning.

    - id: planning_done
      name: Decomposition done
      specialist:
        id: decomposition
        name: Decomposition
      instructions: >
        Terminal state for the parent decomposition task.

    - id: planning
      name: Planning
      specialist:
        id: planning
        name: Planning
      instructions: >
        Analyze one Bookstore documentation issue, clarify scope and acceptance criteria,
        then hand it off to developer implementation.

    - id: dev_implementation
      name: Developer implementation
      specialist:
        id: developer
        name: Developer
      instructions: >
        Implement documentation changes in README.md and/or docs/*.md, commit changes,
        and open a pull request.

    - id: validation
      name: Validation
      specialist:
        id: validation
        name: Validation
      instructions: >
        Validate the documentation PR against the actual Java Spring Boot codebase.

    - id: code_review
      name: Code review
      specialist:
        id: reviewer
        name: Reviewer
      instructions: >
        Review the documentation PR for correctness and completeness.

    - id: auto_merge
      name: Auto merge
      specialist:
        id: auto-merger
        name: Auto Merger
      instructions: >
        Merge or stall the PR according to the workspace merge policy.

  transitions:
    - from: decomposition
      to: planning_done

    - from: planning
      to: dev_implementation

    - from: dev_implementation
      to: validation

    - from: validation
      to: code_review

    - from: code_review
      to: auto_merge

  routines:
    decomposition:
      name: Decompose Bookstore documentation work
      enabled: true
      specialist: decomposition
      fsm_stage: decomposition
      prompt: >
        Analyze Arthur488/bookstore and split the parent documentation goal into
        practical child Linear issues. Cover domain/business capabilities, architecture,
        database/PostgreSQL/Liquibase, REST API/OpenAPI, local setup, build/configuration,
        testing, known limitations, README overhaul, and final review. Created child
        issues must be executable by the standard Ship pipeline and should start at
        stage:planning.

    planning:
      name: Plan one documentation issue
      enabled: true
      specialist: planning
      fsm_stage: planning
      prompt: >
        You are the planning agent for Arthur488/bookstore. Read the pinned Linear issue,
        existing README, Maven configuration, and relevant source code. Produce a precise
        implementation plan for the documentation task: scope, files to inspect/update,
        acceptance criteria, risks, and handoff notes. When ready, finish with
        outcome=ready_next_step and stage_next=dev_implementation.

    developer:
      name: Implement one documentation issue
      enabled: true
      specialist: developer
      fsm_stage: dev_implementation
      prompt: >
        You are the developer agent for Arthur488/bookstore. Implement the pinned
        documentation task directly in the repository. Prefer README.md and docs/*.md.
        Keep the content accurate to the actual Spring Boot 3.1.0 / Java 17 / Maven /
        PostgreSQL / Liquibase codebase. Verify endpoints, Swagger/OpenAPI path,
        configuration, tests, and known mismatches before writing. Commit changes and
        open or update a pull request. When ready, finish with outcome=ready_next_step
        and stage_next=validation, including PR metadata via the Ship sidecar protocol.
        When ready, finish with outcome=ready_next_step and stage_next=validation.
        The finish sidecar/comment must include the exact PR URL in the format:
        PR: https://github.com/Arthur488/bookstore/pull/<number>

    validation:
      name: Validate one documentation PR
      enabled: true
      specialist: validation
      fsm_stage: validation
      prompt: >
        You are the validation agent for Arthur488/bookstore. Validate the documentation
        PR against the repository. Check setup commands, Java version, Maven behavior,
        Spring Boot details, REST API paths, Swagger/OpenAPI, PostgreSQL/Liquibase,
        tests, and limitations. If valid, finish with outcome=ready_next_step and
        stage_next=code_review. If not valid, block with precise corrections.

    reviewer:
      name: Review one documentation PR
      enabled: true
      specialist: reviewer
      fsm_stage: code_review
      prompt: >
        You are the reviewer agent for Arthur488/bookstore. Review the associated PR for
        correctness, completeness, readability, and usefulness for a new developer.
        You must identify the exact GitHub PR URL before finishing.
        If the PR is acceptable, include this exact line in the final comment and
        finish sidecar comment:
        PR: https://github.com/Arthur488/bookstore/pull/<number>
        If you have permission to submit a GitHub approval review, approve the PR.
        If you cannot submit a GitHub approval review, explicitly state that approval
        was not submitted.
        If approved/acceptable, finish with outcome=ready_next_step and
        stage_next=auto_merge. If not acceptable, block with precise corrections.
        If you can approve the PR, submit an actual GitHub APPROVED review.
        If you cannot approve, explicitly state that.

    auto-merger:
      name: Merge approved documentation PR
      enabled: true
      specialist: auto-merger
      fsm_stage: auto_merge
      prompt: >
        You are the auto-merger agent. Evaluate the approved documentation PR according
        to the workspace merge policy. Merge when allowed and safe. If human approval is
        required or checks are not ready, stall with a clear reason.

lanes: {}

artifacts:
  pins: {}
  auto_update: true

cache:
  vcs_tracked: false

telemetry:
  share: false
  anonymous_id: null
  scope:
    artifact_usage: true
    improvement_drafts: true
    errors: false